version: 1.0.0

metadata:
  name: "common"
  description: "Common utilities and platform detection functions"
  version: "1.0.0"
  author: "dev-tools"

specification:
  module:
    dependencies:
      modules: [ logger ]

    commands:
      - name: "os"
        function: "detect_os"
        description: "Detect operating system"
        usage: "os"

      - name: "os-family"
        function: "detect_os_family"
        description: "Detect OS family (debian/rhel/alpine)"
        usage: "os-family"

      - name: "check-command"
        function: "command_exists"
        description: "Check if command exists"
        usage: "check-command <command>"

      - name: "check-env"
        function: "check_env_var"
        description: "Check environment variable"
        usage: "check-env <var_name>"

      - name: "mkdir"
        function: "safe_mkdir"
        description: "Safely create directory"
        usage: "mkdir <path> [owner] [permissions]"

    files:
      - "common-lib.sh"
