version: 1.0.0

metadata:
  name: "tlog"
  description: "Universal logging system with colors and levels"
  version: "1.0.0"
  author: "dev-tools"

specification:
  module:
    commands:
      - name: "debug"
        function: "log_debug"
        description: "Log debug message"
        usage: "debug <message>"

      - name: "info"
        function: "log_info"
        description: "Log info message"
        usage: "info <message>"

      - name: "success"
        function: "log_success"
        description: "Log success message"
        usage: "success <message>"

      - name: "warning"
        function: "log_warning"
        description: "Log warning message"
        usage: "warning <message>"

      - name: "error"
        function: "log_error"
        description: "Log error message"
        usage: "error <message>"

      - name: "set-level"
        function: "logger_set_level"
        description: "Set logging level"
        usage: "set-level <DEBUG|INFO|SUCCESS|WARNING|ERROR>"

    files:
      - "logger-lib.sh"